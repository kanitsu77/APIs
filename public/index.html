<!DOCTYPE html>
<html>
<head>
  <title>REST API</title>
  <style>
    body { background:#0f0f0f; color:white; font-family:sans-serif; padding:20px }
    .category { margin-bottom:10px; cursor:pointer; padding:10px; background:#1e1e1e; border-radius:10px }
    .endpoint { display:none; margin-left:20px }
    a { color:#00ffcc; text-decoration:none; display:block; margin:5px 0 }
  </style>
</head>
<body>

<h1>My REST API</h1>
<div id="container"></div>

<script>
async function loadAPI() {
  const res = await fetch("/api/list")
  const data = await res.json()

  const container = document.getElementById("container")

  Object.keys(data.endpoints).forEach(cat => {
    const div = document.createElement("div")
    div.className = "category"
    div.innerHTML = `📁 [${cat.toUpperCase()}]`

    const endpointDiv = document.createElement("div")
    endpointDiv.className = "endpoint"

    data.endpoints[cat].forEach(name => {
      const a = document.createElement("a")
      a.href = `/api/${cat}/${name}`
      a.innerText = `/api/${cat}/${name}`
      endpointDiv.appendChild(a)
    })

    div.appendChild(endpointDiv)

    div.onclick = () => {
      endpointDiv.style.display =
        endpointDiv.style.display === "block" ? "none" : "block"
    }

    container.appendChild(div)
  })
}

loadAPI()
</script>

</body>
</html>
